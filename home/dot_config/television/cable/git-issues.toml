[metadata]
name = "git-issues"
description = "Browse open issues and create a worktree from one"
requirements = ["gh", "git"]

[source]
# TSV: number, state, title, labels, updatedAt
command = "gh issue list --limit 100"
output = "{split:\\t:0}"
display = "#{split:\\t:0}  {split:\\t:1}  {split:\\t:2}"
no_sort = true

[preview]
command = "gh issue view {split:\\t:0} 2>&1 | head -n 60"

[ui]
layout = "portrait"

[ui.preview_panel]
size = 55

[keybindings]
shortcut = "f5"
enter = "actions:browser"
ctrl-w = "actions:worktree"
ctrl-b = "actions:browser"

[actions.worktree]
description = "Create a branch + worktree for this issue"
command = "n={split:\\t:0}; b=issue-$n; r=$(git rev-parse --show-toplevel); w=\"$(dirname $r)/$(basename $r).$b\"; git worktree add -b \"$b\" \"$w\" 2>/dev/null || git worktree add \"$w\" \"$b\"; cd \"$w\" && exec $SHELL"
mode = "execute"

[actions.browser]
description = "Open the issue in the browser"
command = "gh issue view {split:\\t:0} --web"
shell = "bash"
mode = "fork"
