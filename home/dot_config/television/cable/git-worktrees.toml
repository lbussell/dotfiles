[metadata]
name = "git-worktrees"
description = "Browse and manage git worktrees"
requirements = ["git"]

[source]
command = "git worktree list | sed \"s|$HOME|~|g\""
output = "{split: :0}"
no_sort = true

[preview]
command = [
  "git -C {0} log --oneline --graph --decorate -20 --color=always",
]

[ui.preview_panel]
size = 55

[keybindings]
enter = "actions:cd"
ctrl-e = "actions:code"
ctrl-g = "actions:lg"
ctrl-d = "actions:remove"

[actions.cd]
description = "Open a new shell in the selected worktree"
command = "cd {0} && $SHELL"
mode = "execute"

[actions.code]
description = "Open the worktree in vscode"
command = "code {0}"
shell = "bash"
mode = "fork"

[actions.lg]
description = "Open the worktree in lazygit"
command = "cd {0} && lazygit"
shell = "bash"
mode = "fork"

[actions.remove]
description = "Remove the selected worktree"
command = "gum confirm 'Remove worktree {0}?' && git worktree remove '{0}'"
mode = "fork"
