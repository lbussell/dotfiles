[metadata]
name = "git-branches"
description = "Browse git branches and spin up a worktree from one"
requirements = ["git", "gh"]

[source]
# Local branches, most recently committed first.
command = "git for-each-ref --format='%(refname:short)' --sort=-committerdate refs/heads"
no_sort = true

[preview]
# Plain git/gh output: recent commits on the branch plus any associated PR.
command = "echo '=== recent commits ===' && git log --oneline --decorate -20 {} && echo && echo '=== pull request ===' && gh pr list --head {} --state all 2>&1 | head -n 20"

[ui]
layout = "portrait"

[ui.preview_panel]
size = 55

[keybindings]
shortcut = "f3"
enter = "actions:worktree"
ctrl-w = "actions:worktree"

[actions.worktree]
description = "Create (or open) a worktree for this branch"
command = "r=$(git rev-parse --show-toplevel); w=\"$(dirname $r)/$(basename $r).{}\"; git worktree add \"$w\" {} 2>/dev/null; cd \"$w\" && exec $SHELL"
mode = "execute"
