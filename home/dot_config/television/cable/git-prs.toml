[metadata]
name = "git-prs"
description = "Browse open pull requests and create a worktree from one"
requirements = ["gh", "git"]

[source]
# TSV: number, title, branch, state, updatedAt
command = "gh pr list --limit 100"
output = "{split:\\t:0}"
display = "#{split:\\t:0}  {split:\\t:3}  {split:\\t:1}  ({split:\\t:2})"
no_sort = true

[preview]
command = "gh pr view {split:\\t:0} 2>&1 | head -n 60"

[ui]
layout = "portrait"

[ui.preview_panel]
size = 55

[keybindings]
shortcut = "f4"
enter = "actions:worktree"
ctrl-w = "actions:worktree"
ctrl-b = "actions:browser"

[actions.worktree]
description = "Create (or open) a worktree for this PR"
command = "n={split:\\t:0}; b=$(gh pr view $n --json headRefName -q .headRefName); r=$(git rev-parse --show-toplevel); w=\"$(dirname $r)/$(basename $r).$b\"; git worktree add --detach \"$w\" 2>/dev/null; cd \"$w\" && gh pr checkout $n && exec $SHELL"
mode = "execute"

[actions.browser]
description = "Open the PR in the browser"
command = "gh pr view {split:\\t:0} --web"
shell = "bash"
mode = "fork"
