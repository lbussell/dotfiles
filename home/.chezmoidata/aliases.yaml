aliases:
  - from: "cz"
    to:
      default: "chezmoi"
  - from: ".j"
    to:
      default: "just --justfile ~/.justfile --working-directory ."
  - from: "help"
    to:
      default: ".j"
  - from: "ll"
    to:
      default: "ls -la"
      windows: "Get-ChildItem"
  - from: "b"
    to:
      default: "popd"
  - from: "up"
    to:
      default: "cd .."
  - from: "lg"
    to:
      default: "lazygit"
  - from: "vim"
    to:
      default: "nvim"
  - from: "copilot"
    to:
      default: "copilot --yolo"
  - from: "clip"
    to:
      linux: "wl-copy"
      darwin: "pbcopy"
      windows: "clip"
  - from: "g"
    to:
      default: "tv git-worktrees"
  - from: "gw"
    to:
      default: "tv git-worktrees"
  - from: "gb"
    to:
      default: "tv git-branches"
  - from: "gp"
    to:
      default: "tv git-prs"
  - from: "gi"
    to:
      default: "tv git-issues"
