aliases:
  - from: "cz"
    to:
      default: "chezmoi"
  - from: ".j"
    to:
      default: "just --justfile ~/.justfile --working-directory ."
  - from: "help"
    to:
      default: ".j"
  - from: "ll"
    to:
      default: "ls -la"
      windows: "Get-ChildItem"
  - from: "g"
    to:
      default: "git status"
  - from: "lg"
    to:
      default: "lazygit"
  - from: "vim"
    to:
      default: "nvim"
  - from: "co"
    to:
      default: "copilot --yolo"
  - from: "clip"
    to:
      linux: "wl-copy"
      darwin: "pbcopy"
      windows: "clip"
