scripts:
  homebrew:
    check: "command -v brew"
    env:
      NONINTERACTIVE: "1"
    url: "https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh"
  copilot-cli:
    check: "command -v copilot"
    url: "https://gh.io/copilot-install"

homebrew:
  exclude:
    exedev:
      - gh
  darwin:
    formulae:
      - tmux
  unix:
    formulae:
      - oven-sh/bun/bun
      - uv
      - lazygit
      - gh
      - neovim
      - atuin
      - just
      - notation
      - oras
      - gum
      - glow
      - vhs
      - television
      - ripgrep
      - bat
      - fd
    casks: []

winget:
  - oven-sh.bun.bun
  - astral-sh.uv
  - Microsoft.DotNet.SDK.10
  - GitHub.cli
  - JesseDuffield.lazygit
  - Neovim.Neovim
  - Atuinsh.Atuin
  - Casey.Just
  - GitHub.copilot-cli
  - NotaryProject.Notation
  - ORASProject.ORAS
  - charmbracelet.gum
  - charmbracelet.glow
  - charmbracelet.vhs
  - uutils.coreutils
  - alexpasmantier.television
  - BurntSushi.ripgrep.MSVC
  - sharkdp.bat
  - sharkdp.fd

bun:
  # Pi coding agent: https://pi.dev/
  - "@mariozechner/pi-coding-agent"
